<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flint AI</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-L7856P3VNT');
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient-start: #141417;
      --bg-gradient-end: #09090b;
      --panel-bg: rgba(24, 24, 27, 0.6);
      --panel-hover: rgba(39, 39, 42, 0.8);
      --text: #fafafa;
      --text-soft: #a1a1aa;
      --accent: #d1d5db; 
      --discord: #5865F2;
      --border-light: rgba(255, 255, 255, 0.04);
      --border-hover: rgba(255, 255, 255, 0.12);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.5);
      --danger: #ef4444;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end) 80%) no-repeat fixed;
      color: var(--text);
      overflow-x: hidden;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 750px;
      padding: 20px;
      z-index: 10;
    }

    .title-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
      gap: 4px;
    }

    .title {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-soft);
      text-align: center;
    }

    /* AI Chat Interface Styles */
    .chat-card {
      width: 100%;
      height: 60vh;
      min-height: 450px;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border-light);
      font-size: 0.85rem;
    }

    .chat-header a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--border-light);
      transition: color 0.2s ease;
    }

    .chat-header a:hover {
      color: var(--discord);
    }

    #status {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-soft);
    }
    #status.connected { color: var(--success); }
    #status.connected::before { background: var(--success); }
    #status.error { color: var(--danger); }
    #status.error::before { background: var(--danger); }

    #chat-history {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      padding: 14px 18px;
      border-radius: 20px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 0.95rem;
      animation: fadeIn 0.3s ease-in-out;
    }

    .message.user {
      align-self: flex-end;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-light);
      color: var(--accent);
      border-bottom-left-radius: 4px;
    }

    .message.bot pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 14px;
      border-radius: 12px;
      overflow-x: auto;
      margin-top: 10px;
      border: 1px solid var(--border-light);
    }

    .message.bot code {
      font-family: Consolas, Monaco, monospace;
      font-size: 0.9em;
      color: #e2e8f0;
    }

    #chat-form {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      border-top: 1px solid var(--border-light);
      background: rgba(0, 0, 0, 0.15);
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.05rem;
    }

    #chat-input::placeholder {
      color: var(--text-soft);
    }

    #chat-send {
      background: var(--text);
      color: var(--bg-gradient-end);
      border: none;
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #chat-send:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    #chat-send:disabled {
      background: var(--panel-hover);
      color: var(--text-soft);
      cursor: not-allowed;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      width: 100%;
      margin-top: auto; 
      padding: 20px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1px solid var(--border-light);
      background: rgba(13, 13, 18, 0.1);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .copyright {
      font-size: 0.8rem;
      color: rgba(161, 161, 170, 0.5);
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="main-container">
    <div class="title-section">
      <h1 class="title">Flint AI</h1>
      <div class="subtitle">Your secure, intelligent assistant.</div>
    </div>

    <div class="chat-card">
      <div class="chat-header">
        <span style="color: var(--text-soft)">
          Please don't abuse AI. Issues? <a href="https://discord.gg/gn-math" target="_blank">Join Discord</a>
        </span>
        <span id="status">Connecting...</span>
      </div>

      <div id="chat-history"></div>

      <form id="chat-form">
        <input type="text" id="chat-input" placeholder="Ask something..." autocomplete="off" disabled />
        <button type="submit" id="chat-send" disabled>
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <footer>
    <span class="copyright">© 2026 Flint</span>
  </footer>

  <script>
    /* =========================================
       Background Particles (From nt.html)
    ========================================= */
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    
    let particles = [];
    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = 0.1 + Math.random() * 0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    /* =========================================
       Deobfuscated Chat Logic
    ========================================= */
    
    // Extracted original WebSocket logic 
    // Modify URL if your backend varies from the gn-math domain inferred originally
    const WS_URL = "wss://chat-api.gn-math.net/ws"; 
    
    const chatHistory = document.getElementById('chat-history');
    const statusEl = document.getElementById('status');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send');
    const chatForm = document.getElementById('chat-form');

    let ws = null;
    let botBubble = null;
    let botText = '';
    let streaming = false;
    let historyData = [];

    function connect() {
      statusEl.textContent = 'Connecting...';
      statusEl.className = '';
      
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      };

      ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch (e) {
          return;
        }

        switch (data.type) {
          case 'start':
            botText = '';
            botBubble = addMessage('bot', '');
            streaming = true;
            break;

          case 'stream':
            if (botBubble && data.data) {
              botText += data.data;
              botBubble.innerHTML = renderMarkdown(botText);
              scrollToBottom();
            }
            break;

          case 'end':
            if (botBubble) {
              botBubble.innerHTML = renderMarkdown(data.data || botText);
              historyData.push({ role: 'assistant', content: data.data || botText });
              botBubble = null;
              streaming = false;
              inputEl.disabled = false;
              sendBtn.disabled = false;
              inputEl.focus();
              scrollToBottom();
            }
            break;

          case 'error':
            addMessage('bot', '⚠ ' + (data.data || 'An error occurred.'));
            streaming = false;
            inputEl.disabled = false;
            sendBtn.disabled = false;
            break;
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'error';
        inputEl.disabled = true;
        sendBtn.disabled = true;
        setTimeout(connect, 3000); // Attempt reconnection
      };

      ws.onerror = () => {
        statusEl.textContent = 'Connection Error';
        statusEl.className = 'error';
      };
    }

    function send(text) {
      if (text && ws && ws.readyState === WebSocket.OPEN && !streaming) {
        addMessage('user', text);
        historyData.push({ role: 'user', content: text });
        ws.send(JSON.stringify({ question: text, history: historyData }));
        
        inputEl.value = '';
        inputEl.disabled = true;
        sendBtn.disabled = true;
      }
    }

    function addMessage(sender, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      msgDiv.innerHTML = renderMarkdown(text);
      chatHistory.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    function scrollToBottom() {
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // Cleaned Markdown rendering safely handling XSS
    function renderMarkdown(text) {
      let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (text) send(text);
    });

    // Initialize Connection
    connect();
  </script>
</body>
</html>
